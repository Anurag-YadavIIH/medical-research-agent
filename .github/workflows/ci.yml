name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src tests evaluations

      - name: Format check (black)
        run: uv run black --check src tests evaluations

      - name: Type check (mypy)
        run: uv run mypy src evaluations

      # Includes evaluations/ unit tests (test_evaluation_metrics.py,
      # test_evaluation_runner.py) — both run against fixtures/mocks only.
      # `--live` (real NCBI/CrossRef + a real LLM key) is never run here.
      - name: Test (pytest + coverage)
        run: uv run pytest
