services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mra
      POSTGRES_PASSWORD: mra
      POSTGRES_DB: mra
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mra"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://mra:mra@postgres:5432/mra
    depends_on:
      postgres: { condition: service_healthy }
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://mra:mra@postgres:5432/mra
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request as r; r.urlopen('http://localhost:8000/health', timeout=3)\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
    ports: ["8501:8501"]
    depends_on:
      backend: { condition: service_healthy }
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request as r; r.urlopen('http://localhost:8501/_stcore/health', timeout=3)\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
