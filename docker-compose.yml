services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mra
      POSTGRES_PASSWORD: mra
      POSTGRES_DB: mra
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mra"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://mra:mra@postgres:5432/mra
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
    ports: ["8501:8501"]
    depends_on: [backend]

volumes:
  pgdata:
